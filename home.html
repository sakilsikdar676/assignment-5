<body>
    <header class=" bg-base-100 shadow-sm">

                </div>
                <a class="btn btn-ghost text-xl hidden md:inline-block">GitHub Issues Tracker</a>
            </div>

                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">

                </div>

                <input type="text"
                    class=" py-2.5 pl-10 pr-4 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Search issues...">
                    
            </div>
            <button class="btn btn-primary ml-2"> <i class="fa-solid fa-plus"></i>New Issue</button>
        </div>
    </header>

<section>
