<!DOCTYPE html>
<html lang="en">

<head>

    <title>login page</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"

    <style>
        * {
            font-family: "Geist", sans-serif;
            box-sizing: border-box;


        }
    </style>

<body class="overflow-x-hidden">
    <header class=" bg-white shadow-md py-4 px-6 mx-auto">
        <div class="container mx-auto flex flex-wrap items-center justify-between gap-4 text-center">
            <div class="flex items-center gap-2 mx-auto">
                <div class="w-10 h-auto rounded-full ">
                    <img alt="Tailwind CSS Navbar component" class="w-8 h-8" src="./assets/github-logo.png" />
                </div>
                <a class=" font-bold text-lg">GitHub Issues Tracker </a>
            </div>
            <div class="flex items-center mx-auto">
                <div class="relative  max-w-md mx-auto">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <i class="fa-brands fa-sistrix text-gray-500"></i>
                    </div>

                    <input type="text"
                        class=" py-2.5 pl-10 pr-4 text-sm w-[210px] lg:w-[300px] border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Search issues...">

                </div>
                <button class="btn btn-primary ml-2 hidden md:inline-block"> <i class="fa-solid fa-plus"></i>New
                    Issue</button>
                <button class="btn btn-primary ml-2 inline-block md:hidden"> <i class="fa-solid fa-plus"></i></button>
            </div>
        </div>
    </header>

    <section>
        <div class="mt-10 mb-5" id="div-container">

        </div>

        <div id="div-container2" class="">

        </div>
    </section>

    <section id="issues-container"
        class="bg-[#FBFBFB] w-9/12 mx-auto shadow-sm border-t border-gray-200 place-items-center items-stretch grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-3 gap-5 ">
        
    </section>
















    <script src="./script/home.js"></script>
